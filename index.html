<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>Nattivo | Orden de Compra</title>
        <style>
            body {
                  font-family: Arial, sans-serif;
                        background: #f7f5f2;
                              margin: 0;
                                    padding: 30px;
                                          color: #2b2b2b;
                                              }
                                              
                                                  .container {
                                                        max-width: 850px;
                                                              margin: auto;
                                                                    background: #ffffff;
                                                                          padding: 30px;
                                                                                border-radius: 18px;
                                                                                      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
                                                                                          }
                                                                                          
                                                                                              h1 {
                                                                                                    text-align: center;
                                                                                                          color: #7a5c3e;
                                                                                                                margin-bottom: 25px;
                                                                                                                    }
                                                                                                                    
                                                                                                                        .form-group {
                                                                                                                              margin-bottom: 18px;
                                                                                                                                  }
                                                                                                                                  
                                                                                                                                      label {
                                                                                                                                            display: block;
                                                                                                                                                  font-weight: bold;
                                                                                                                                                        margin-bottom: 6px;
                                                                                                                                                            }
                                                                                                                                                            
                                                                                                                                                                input, select, textarea {
                                                                                                                                                                      width: 100%;
                                                                                                                                                                            padding: 12px;
                                                                                                                                                                                  border: 1px solid #d8d2ca;
                                                                                                                                                                                        border-radius: 10px;
                                                                                                                                                                                              font-size: 14px;
                                                                                                                                                                                                    box-sizing: border-box;
                                                                                                                                                                                                        }
                                                                                                                                                                                                        
                                                                                                                                                                                                            textarea {
                                                                                                                                                                                                                  resize: vertical;
                                                                                                                                                                                                                        min-height: 100px;
                                                                                                                                                                                                                            }
                                                                                                                                                                                                                            
                                                                                                                                                                                                                                .row {
                                                                                                                                                                                                                                      display: grid;
                                                                                                                                                                                                                                            grid-template-columns: 1fr 1fr;
                                                                                                                                                                                                                                                  gap: 20px;
                                                                                                                                                                                                                                                      }
                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                          .total-box {
                                                                                                                                                                                                                                                                background: #f0ebe4;
                                                                                                                                                                                                                                                                      padding: 15px;
                                                                                                                                                                                                                                                                            border-radius: 12px;
                                                                                                                                                                                                                                                                                  margin-top: 20px;
                                                                                                                                                                                                                                                                                        font-size: 18px;
                                                                                                                                                                                                                                                                                              font-weight: bold;
                                                                                                                                                                                                                                                                                                    text-align: right;
                                                                                                                                                                                                                                                                                                          color: #7a5c3e;
                                                                                                                                                                                                                                                                                                              }
                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                  button {
                                                                                                                                                                                                                                                                                                                        width: 100%;
                                                                                                                                                                                                                                                                                                                              background: #7a5c3e;
                                                                                                                                                                                                                                                                                                                                    color: white;
                                                                                                                                                                                                                                                                                                                                          border: none;
                                                                                                                                                                                                                                                                                                                                                padding: 14px;
                                                                                                                                                                                                                                                                                                                                                      border-radius: 12px;
                                                                                                                                                                                                                                                                                                                                                            font-size: 16px;
                                                                                                                                                                                                                                                                                                                                                                  cursor: pointer;
                                                                                                                                                                                                                                                                                                                                                                        margin-top: 20px;
                                                                                                                                                                                                                                                                                                                                                                            }
                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                button:hover {
                                                                                                                                                                                                                                                                                                                                                                                      background: #614830;
                                                                                                                                                                                                                                                                                                                                                                                          }
                                                                                                                                                                                                                                                                                                                                                                                            </style>
                                                                                                                                                                                                                                                                                                                                                                                            </head>
                                                                                                                                                                                                                                                                                                                                                                                            <body>
                                                                                                                                                                                                                                                                                                                                                                                              <div class="container">
                                                                                                                                                                                                                                                                                                                                                                                                  <h1>Orden de Compra - Nattivo</h1>
                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                      <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                            <label>Número de OC</label>
                                                                                                                                                                                                                                                                                                                                                                                                                  <input type="text" id="ocNumber" readonly>
                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                <label>Proveedor</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                      <select id="proveedor">
                                                                                                                                                                                                                                                                                                                                                                                                                                              <option value="">Seleccione un proveedor</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option>Casa Textile</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                              <option>Passarela Textile</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option>Mianeria.com</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <label>Descripción del pedido</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <textarea id="descripcion" placeholder="Ingrese detalle del pedido..."></textarea>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="row">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <label>Origen del dinero</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <select id="origen">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <option value="">Seleccione</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <option>Caja menor</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option>Cuenta principal</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <option>Presupuesto mensual</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <label>Valor base</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <input type="number" id="valorBase" placeholder="0">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="form-group">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <label>¿Aplica IVA?</label>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <select id="iva">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <option value="0">No</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <option value="0.19">Sí (19%)</option>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          </select>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="total-box">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        Total: $<span id="total">0</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <button>Guardar Orden de Compra</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function generarConsecutivo() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              let ultimo = localStorage.getItem('ultimoOC') || 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ultimo = parseInt(ultimo) + 1;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          localStorage.setItem('ultimoOC', ultimo);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('ocNumber').value = 'OC-' + String(ultimo).padStart(4, '0');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function calcularTotal() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              const base = parseFloat(document.getElementById('valorBase').value) || 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    const iva = parseFloat(document.getElementById('iva').value) || 0;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          const total = base + (base * iva);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                document.getElementById('total').innerText = total.toLocaleString('es-CO');
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    }
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('valorBase').addEventListener('input', calcularTotal);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('iva').addEventListener('change', calcularTotal);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                generarConsecutivo();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </script>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </body>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </html>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  >
