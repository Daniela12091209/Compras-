<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Nattivo ERP</title>

<style>
body{
font-family: Arial;
background:#F5F1EC;
margin:0;
padding:20px;
}

h1{
text-align:center;
color:#7a5c3e;
}

.nav{
display:flex;
justify-content:center;
gap:10px;
margin-bottom:20px;
}

.nav button{
background:#7a5c3e;
color:white;
border:none;
padding:10px 20px;
border-radius:10px;
cursor:pointer;
}

.section{
display:none;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.active{display:block}

.card{
background:#f9f7f4;
padding:15px;
border-radius:12px;
margin:10px 0;
}

/* compras */
.form-group{margin-bottom:15px;}
.row{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

/* inventario */
.form-inv{
display:grid;
grid-template-columns: repeat(4,1fr);
gap:10px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns: repeat(auto-fill,minmax(220px,1fr));
gap:15px;
}

.card-inv{
background:#f9f7f4;
border-radius:14px;
padding:15px;
}

.card-inv button{
background:#e74c3c;
border:none;
color:white;
padding:5px;
border-radius:6px;
cursor:pointer;
}

/* calendario */
.calendar{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:10px;
}

.day{
background:#eee;
padding:10px;
border-radius:8px;
cursor:pointer;
min-height:80px;
}

.event{
font-size:11px;
background:#7a5c3e;
color:white;
padding:2px;
margin-top:3px;
border-radius:4px;
}

.controls{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

input, textarea, select{
width:100%;
margin-top:5px;
padding:8px;
border-radius:8px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<h1>Nattivo ERP</h1>

<div class="nav">
<button onclick="show('dashboard')">Dashboard</button>
<button onclick="show('compras')">Compras</button>
<button onclick="show('inventario')">Inventario</button>
<button onclick="show('marketing')">Marketing</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="section active">
<h2>Resumen</h2>
<div id="resumen"></div>
</div>

<!-- ================= COMPRAS ================= -->
<div id="compras" class="section">

<h2>Orden de Compra - Nattivo</h2>

<div class="form-group">
<label>Número de OC</label>
<input type="text" id="ocNumber" readonly>
</div>

<div class="form-group">
<label>Proveedor</label>
<select id="proveedor">
<option value="">Seleccione un proveedor</option>
<option>Casa Textile</option>
<option>Passarela Textile</option>
<option>Mianeria.com</option>
</select>
</div>

<div class="form-group">
<label>Descripción del pedido</label>
<textarea id="descripcion"></textarea>
</div>

<div class="row">
<div class="form-group">
<label>Origen del dinero</label>
<select id="origen">
<option value="">Seleccione</option>
<option>Caja menor</option>
<option>Cuenta principal</option>
<option>Presupuesto mensual</option>
</select>
</div>

<div class="form-group">
<label>Valor base</label>
<input type="number" id="valorBase">
</div>
</div>

<div class="form-group">
<label>¿Aplica IVA?</label>
<select id="iva">
<option value="0">No</option>
<option value="0.19">Sí (19%)</option>
</select>
</div>

<div class="card">
Total: $<span id="total">0</span>
</div>

<button onclick="guardarOrden()">Guardar Orden de Compra</button>

</div>

<!-- ================= INVENTARIO ================= -->
<div id="inventario" class="section">

<h2>Inventario</h2>

<div class="form-inv">
<input id="prod" placeholder="Producto">
<input id="cant" type="number" placeholder="Cantidad">
<input id="precio" type="number" placeholder="Precio">
<button onclick="agregarInv()">Agregar</button>
</div>

<div id="listaInv" class="grid"></div>

</div>

<!-- ================= MARKETING ================= -->
<div id="marketing" class="section">

<h2>Marketing</h2>

<div class="controls">
<button onclick="cambiarMes(-1)">⬅</button>
<h3 id="mes"></h3>
<button onclick="cambiarMes(1)">➡</button>
</div>

<div id="calendar" class="calendar"></div>

<div class="card">
<h3>Eventos del día</h3>
<div id="eventosDia"></div>

<input id="titulo" placeholder="Título">
<textarea id="detalle" placeholder="Detalle"></textarea>

<button onclick="guardarEvento()">Agregar evento</button>
</div>

</div>

<script>

/* navegación */
function show(sec){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(sec).classList.add('active');
}

/* DASHBOARD */
function cargarResumen(){
let inv = JSON.parse(localStorage.getItem("inv"))||[];
let eventos = JSON.parse(localStorage.getItem("eventos"))||[];

document.getElementById("resumen").innerHTML=`
<div class="card">📦 Productos: ${inv.length}</div>
<div class="card">📢 Eventos: ${eventos.length}</div>
`;
}

/* ================= COMPRAS ================= */

function generarConsecutivo(){
let n = localStorage.getItem('oc') || 0;
n++;
localStorage.setItem('oc',n);
document.getElementById('ocNumber').value = "OC-"+String(n).padStart(4,'0');
}

function calcularTotal(){
let base = parseFloat(document.getElementById('valorBase').value)||0;
let iva = parseFloat(document.getElementById('iva').value)||0;
let total = base + (base * iva);
document.getElementById('total').innerText = total.toLocaleString();
}

document.getElementById('valorBase').addEventListener('input',calcularTotal);
document.getElementById('iva').addEventListener('change',calcularTotal);

function guardarOrden(){

let descripcion = document.getElementById("descripcion").value;
let valor = parseFloat(document.getElementById("valorBase").value)||0;

if(!descripcion || !valor){
alert("Completa los campos");
return;
}

/* conexión inventario */
let inv = JSON.parse(localStorage.getItem("inv")) || [];

inv.push({
p: descripcion,
c: 1,
pr: valor
});

localStorage.setItem("inv", JSON.stringify(inv));

alert("Orden guardada y enviada a inventario");

mostrarInv();
cargarResumen();
generarConsecutivo();
}

generarConsecutivo();

/* ================= INVENTARIO ================= */

function agregarInv(){
let p = prod.value;
let c = parseInt(cant.value);
let pr = parseFloat(precio.value);

if(!p||!c||!pr) return;

let inv = JSON.parse(localStorage.getItem("inv"))||[];
inv.push({p,c,pr});
localStorage.setItem("inv", JSON.stringify(inv));

mostrarInv();
}

function mostrarInv(){

let lista = document.getElementById("listaInv");
lista.innerHTML="";

let inv = JSON.parse(localStorage.getItem("inv"))||[];

if(inv.length===0){
lista.innerHTML="<p>No hay productos</p>";
return;
}

inv.forEach((i,index)=>{
lista.innerHTML+=`
<div class="card-inv">
<h4>${i.p}</h4>
<p>Stock: ${i.c}</p>
<p>$${i.pr}</p>
<button onclick="eliminarInv(${index})">Eliminar</button>
</div>`;
});
}

function eliminarInv(i){
let inv = JSON.parse(localStorage.getItem("inv"));
inv.splice(i,1);
localStorage.setItem("inv", JSON.stringify(inv));
mostrarInv();
cargarResumen();
}

mostrarInv();

/* ================= MARKETING ================= */

let mesActual=new Date().getMonth();
let añoActual=new Date().getFullYear();
let fechaSel="";

function cambiarMes(n){
mesActual+=n;
if(mesActual<0){mesActual=11;añoActual--;}
if(mesActual>11){mesActual=0;añoActual++;}
generarCalendario();
}

function generarCalendario(){

let cal=document.getElementById("calendar");
cal.innerHTML="";

let dias=new Date(añoActual,mesActual+1,0).getDate();

mes.innerText=`${mesActual+1}/${añoActual}`;

let eventos=JSON.parse(localStorage.getItem("eventos"))||[];

for(let i=1;i<=dias;i++){

let fecha=`${añoActual}-${mesActual+1}-${i}`;

let d=document.createElement("div");
d.classList.add("day");

d.innerHTML=`<strong>${i}</strong>`;

eventos.filter(e=>e.fecha===fecha)
.forEach(e=>{
d.innerHTML+=`<div class="event">${e.titulo}</div>`;
});

d.onclick=()=>{
fechaSel=fecha;
verEventos();
};

cal.appendChild(d);
}

}

function verEventos(){

let cont=document.getElementById("eventosDia");
cont.innerHTML="";

let eventos=JSON.parse(localStorage.getItem("eventos"))||[];

eventos
.filter(e=>e.fecha===fechaSel)
.forEach((e,i)=>{
cont.innerHTML+=`
<div class="card">
<strong>${e.titulo}</strong><br>
${e.detalle}
<button onclick="eliminarEvento(${i})">Eliminar</button>
</div>`;
});
}

function guardarEvento(){

if(!fechaSel){alert("Selecciona un día");return;}

let t=titulo.value;
let d=detalle.value;

let eventos=JSON.parse(localStorage.getItem("eventos"))||[];

eventos.push({fecha:fechaSel,titulo:t,detalle:d});

localStorage.setItem("eventos",JSON.stringify(eventos));

generarCalendario();
verEventos();
cargarResumen();
}

function eliminarEvento(i){

let eventos=JSON.parse(localStorage.getItem("eventos"));

eventos.splice(i,1);

localStorage.setItem("eventos",JSON.stringify(eventos));

generarCalendario();
verEventos();
cargarResumen();
}

generarCalendario();
cargarResumen();

</script>

</body>
</html>
